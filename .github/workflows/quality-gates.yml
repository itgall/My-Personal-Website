# Quality Gates — build, links, accessibility, and Lighthouse checks.
#
# Runs on PRs to main and on pushes to main. The build job produces a dist/
# artifact that the three downstream jobs check in parallel.
#
# All actions are pinned to commit SHAs (tag comments alongside) and the
# globally installed CLI tools are version-pinned, so a compromised or
# breaking upstream release can't silently change what CI runs. Dependabot
# (github-actions ecosystem) proposes pin bumps.

name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build job — produces dist/ artifact for downstream checks ────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate Pagefind search index
        run: npx pagefind --site dist

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Link checking with lychee ────────────────────────────────────────────
  links:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # --root-dir lets lychee resolve root-relative links (/teaching/,
          # /rss.xml, /favicon.svg) against the built site root.
          args: >-
            --verbose
            --no-progress
            --root-dir "${{ github.workspace }}/dist"
            --accept 200,204,301,302,403,429
            --exclude-path dist/pagefind
            --exclude 'scholar.google.com'
            --exclude 'linkedin.com'
            dist/
          fail: true

  # ── Accessibility testing with Pa11y CI ──────────────────────────────────
  accessibility:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for config files)
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Pa11y CI and serve
        run: npm install -g pa11y-ci@4.1.1 serve@14.2.6

      - name: Run Pa11y CI
        run: |
          # Serve the built site and wait until it actually answers.
          serve dist -l 8080 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && break
            sleep 1
          done

          # Config-driven (.pa11yci.json): standard WCAG2AA, the page list, and
          # the Chrome --no-sandbox flags the GitHub runner needs (puppeteer
          # crashes with a sandbox SIGABRT otherwise). --standard is a pa11y,
          # not pa11y-ci, CLI flag and can't be passed here.
          pa11y-ci --threshold 0 || EXIT_CODE=$?

          kill $SERVER_PID 2>/dev/null || true
          exit ${EXIT_CODE:-0}

  # ── Performance testing with Lighthouse CI ───────────────────────────────
  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for config files)
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.1 serve@14.2.6

      - name: Run Lighthouse CI
        run: |
          serve dist -l 8080 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && break
            sleep 1
          done

          # No preset: lighthouse:recommended re-asserts perf audits
          # (render-blocking-resources, uses-long-cache-ttl) that fail under a
          # plain `serve` (Netlify sets the cache headers in production). Assert
          # only the category scores we actually gate on.
          lhci autorun \
            --collect.url=http://localhost:8080/ \
            --collect.url=http://localhost:8080/publications/ \
            --collect.url=http://localhost:8080/writing/ \
            --collect.url=http://localhost:8080/cv/ \
            --assert.assertions.categories:accessibility="error; minScore=0.95" \
            --assert.assertions.categories:best-practices="error; minScore=0.95" \
            --assert.assertions.categories:seo="error; minScore=0.95" \
            || EXIT_CODE=$?

          kill $SERVER_PID 2>/dev/null || true
          exit ${EXIT_CODE:-0}
