# Netlify configuration — this is where the site is hosted. Netlify picks up
# this file from the repo root. The build command runs Astro and then
# Pagefind so search is indexed.

[build]
  command = "rm -rf .astro && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"
  # Give the build a larger Node heap; image optimization is the memory-heavy
  # step. The default (~1.7 GB) is enough today but leaves little headroom.
  NODE_OPTIONS = "--max-old-space-size=8192"

# ── Netlify cache plugin ──────────────────────────────────────────────────────
# Persist Astro's image-optimization cache (node_modules/.astro) between
# deploys so unchanged images aren't re-optimized. The root .astro directory
# is deliberately NOT cached — the build command deletes it for a clean
# content-layer sync, so caching it was dead weight.

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "node_modules/.astro",
    ]

# ── URL redirects ─────────────────────────────────────────────────────────────
# Essays and notes merged into /writing/; /research/ predates the Eleventy
# migration. Rules are first-match top-down, so these sit before the 404
# fallback (a 404 rule first would shadow every redirect below it).

[[redirects]]
  from = "/blog/tags/*"
  to = "/writing/tags/:splat"
  status = 301

[[redirects]]
  from = "/notes/tags/*"
  to = "/writing/tags/:splat"
  status = 301

[[redirects]]
  from = "/notes/"
  to = "/writing/notes/"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/writing/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/writing/:splat"
  status = 301

[[redirects]]
  from = "/notes/*"
  to = "/writing/:splat"
  status = 301

[[redirects]]
  from = "/og/blog/*"
  to = "/og/writing/:splat"
  status = 301

[[redirects]]
  from = "/og/notes/*"
  to = "/og/writing/:splat"
  status = 301

[[redirects]]
  from = "/research/*"
  to = "/publications/:splat"
  status = 301

# ── 404 fallback ──────────────────────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Security headers ─────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # script-src keeps 'unsafe-inline': the pre-paint theme script and several
    # is:inline page scripts are inline by design, and a static hash list in
    # this file would silently break pages whenever one of them changes. The
    # site renders no user input at runtime, so the residual XSS surface is
    # accepted and documented. jsdelivr (KaTeX is bundled locally) and the
    # build-time-only semanticscholar/orcid hosts were removed as dead.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' plausible.io; style-src 'self' 'unsafe-inline' fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' fonts.gstatic.com; connect-src 'self' https://plausible.io; frame-src 'self' https://www.youtube-nocookie.com https://*.substack.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"

# ── Cache-Control for immutable hashed assets ─────────────────────────────────

# ── Admin CMS — permissive CSP for Sveltia CMS ───────────────────────────────
# Sveltia CMS loads from unpkg.com and communicates with the GitHub API.
# The admin page is behind authentication and not indexed by search engines.
# This permissive policy overrides the strict site-wide CSP for /admin/ only.

[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' unpkg.com; style-src 'self' 'unsafe-inline' unpkg.com fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' fonts.gstatic.com data:; connect-src 'self' https://api.github.com https://github.com https://raw.githubusercontent.com; frame-src 'self' https://github.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"

# ── Cache-Control for immutable hashed assets ─────────────────────────────────

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
