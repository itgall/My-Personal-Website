experience:
  - title: Research Engineer
    organization: Wellman Center for Photomedicine
    parent: Harvard Medical School / Massachusetts General Hospital
    location: Boston, MA
    dates: May 2025–Present
    current: true
    highlights:
      - Leading an independent spectroscopic OCT project performing 50+ experiments on a swept-source VCSEL system, developing physics-constrained inverse models to extract tissue optical properties at 5-µm resolution
      - Developing inverse spectroscopic modeling grounded in biological light-matter interactions to recover absorption, scattering, and molecular concentration profiles from OCT data at sub-resolution scales
      - First-authoring a manuscript for Biomedical Optics Express identifying, through first-principles analysis, polarization-induced artifacts that corrupt spectroscopic OCT measurements
  - title: Research Assistant
    organization: Wellman Center for Photomedicine
    parent: Harvard Medical School / Massachusetts General Hospital
    location: Boston, MA
    dates: Feb 2025–May 2025
    highlights:
      - Constructed the first micro-LED-based OCT system prototype, building hardware and acquisition software replacing swept-source lasers with individually addressable LEDs for wavelength-selective interferometric measurement
      - Implemented spectral unmixing algorithms for photoacoustic methods, enabling pixel-by-pixel extraction of lipid and collagen concentrations from a custom multi-spectral stimulated Raman scattering system
  - title: Research Assistant
    organization: Colorado School of Mines — Physics Department
    location: Golden, CO
    dates: Aug 2023–May 2024
    highlights:
      - Constructed Fisher information metric tensors for the mean-field Ising model, diagnosing degenerate geometries and identifying parameter-coupling constraints that preclude anti-de Sitter spacetime mappings
      - Developed a Gaussian-smeared spin formulation embedding the classical 1D Ising model, deriving continuous-field partition functions via transfer-matrix eigenvalue decomposition
  - title: Research Project Lead
    organization: Colorado School of Mines — Ultrafast Laser Research Laboratory
    location: Golden, CO
    dates: Aug 2023–Dec 2023
    highlights:
      - Led a team of five undergraduates to design, simulate, and 3D-print prototype micron-scale supersonic jet nozzles for high harmonic generation (HHG) femtosecond laser experiments
      - Simulated 20+ nozzle geometries via CFD in SolidWorks and Mathematica, sweeping throat dimensions and backing pressures to optimize compact nozzle designs for HHG gas targets
