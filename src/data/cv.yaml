research:
  - title: Pr:YLF Solid-State Laser
    institution: Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Co-designed and constructed a CW diode-pumped Pr³⁺:LiYF₄ laser at 640 nm, integrating a 444 nm InGaN pump diode with a symmetric two-mirror cavity. Characterized pump beam quality (M² = 1.25/5.16) and measured single-pass gain of G = 1.36.
  - title: Quantum Optics & Photon Entanglement
    institution: Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Generated polarization-entangled 810 nm photon pairs via dual-crystal Type I SPDC from a 405 nm diode laser. Verified non-local entanglement through CHSH Bell inequality violation using silicon single-photon avalanche detectors and four-channel coincidence counting.
  - title: Diode-Pumped Nd:YAG Laser
    institution: Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Demonstrated passive Q-switching of a diode-pumped Nd:YAG laser (1064 nm, 808 nm pump) using a Cr:YAG saturable absorber, achieving repetition rates up to 3.5 kHz. Numerically solved coupled rate equations for photon density, population inversion, and absorber saturation.
  - title: Photon-Counting Circuit
    institution: Colorado School of Mines
    dates: Aug 2023–Dec 2023
    description: Designed and fabricated a photon-counting circuit with gated BCD decade counters, bistable latches, and one-shot latch/reset control logic. Mapped the complete logic network onto an FPGA via Quartus Prime.
