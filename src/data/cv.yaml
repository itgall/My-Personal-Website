research:
  - title: Polarization-Entangled Photon Pair Generation & Bell-Inequality Measurement
    institution: Graduate Quantum Optics Laboratory, Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Produced polarization-entangled 810 nm photon pairs from dual-crystal Type-I SPDC under a 405 nm diode pump, using a YVO₄ crystal to compensate birefringent walk-off. Measured a CHSH violation of S = 2.51 ± 0.04 with silicon SPADs and four-channel FPGA coincidence counting with nanosecond gating.
  - title: Solid-State Laser Construction and Rate-Equation Modeling
    institution: Graduate Laser Physics Laboratory, Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Designed, built, and characterized a CW diode-pumped Pr³⁺:LiYF₄ laser (640 nm, 35 mW, 18% slope efficiency). Checked four-level rate-equation models against the measured pulse trains, fluorescence spectra, and output power.
  - title: Diode-Pumped Q-Switched Nd:YAG Laser
    institution: Graduate Laser Physics Laboratory, Colorado School of Mines
    dates: Aug 2024–Dec 2024
    description: Demonstrated short-pulse generation by passively Q-switching an Nd:YAG laser (1064 nm, Cr:YAG saturable absorber, repetition rates to 3.5 kHz). Computationally modeled the Q-switching dynamics in Mathematica to verify the experimental results.
