# ==============================================================================
# Sveltia CMS configuration -- the admin UI at /admin/.
#
# Layout: three groups, separated by sidebar dividers.
#
#   Pages    -- one screen per site page. If it appears on that page, it is
#               edited here. Each screen writes one JSON file in src/data/,
#               read by a matching .ts module with safe fallbacks.
#   Content  -- the repeating things: writing, projects, notes, teaching,
#               publications, misc, ventures, speaking, podcast, transcripts.
#               Folder collections map 1:1 to src/content/ and must mirror
#               the Zod schemas in src/content.config.ts exactly.
#   Site     -- global data that appears everywhere: identity and contact,
#               navigation, the CV, and feature toggles.
#
# Conventions:
#   - Emoji in labels are written as YAML \U escapes so this file stays ASCII.
#   - Every optional URL field pairs with optionalUrlField in the Zod schema,
#     which accepts a valid URL or an empty string.
#   - Collection folders each contain a .gitkeep so deleting the last entry
#     never removes the folder from git (that causes loader warnings on CI).
#
# Authentication:
#   Option 1 (simplest): GitHub Personal Access Token (PAT)
#     - Create a fine-grained PAT at github.com/settings/tokens with repo access
#     - Enter it on the Sveltia login screen; no backend needed
#   Option 2 (polished): GitHub OAuth via sveltia/sveltia-cms-auth on
#     Cloudflare Workers; set base_url under backend below.
# ==============================================================================

backend:
  name: github
  repo: itgall/My-Personal-Website
  branch: main
  # Uncomment and set if using Sveltia CMS Authenticator for OAuth:
  # base_url: https://your-auth-worker.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

# -- Slug configuration --------------------------------------------------------
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:

  # ============================================================================
  # PAGES
  # ============================================================================

  - name: pages
    label: "\U0001F4C4 Pages"
    files:
      # -- Homepage -----------------------------------------------------------------
      # File: src/data/homepage.json
      # Read by src/data/homepage.ts -> rendered by src/pages/index.astro
      - name: homepage
        label: "\U0001F3E0 Homepage"
        file: src/data/homepage.json
        fields:
          - { label: "Profile Photo", name: profileImage, widget: image, required: false, hint: "The large photo in the homepage hero. Leave blank to use the default." }
          - label: "Profile Photo Framing"
            name: profileFocal
            widget: select
            default: "top"
            options:
              - { label: "Top Left", value: "top left" }
              - { label: "Top", value: "top" }
              - { label: "Top Right", value: "top right" }
              - { label: "Left", value: "left" }
              - { label: "Center", value: "center" }
              - { label: "Right", value: "right" }
              - { label: "Bottom Left", value: "bottom left" }
              - { label: "Bottom", value: "bottom" }
              - { label: "Bottom Right", value: "bottom right" }
            hint: "Which part of the image stays in frame when it is cropped to fit."
          - { label: "Hero bio", name: bio, widget: text, required: false, hint: "The intro paragraph in the homepage hero. Leave blank to use the default text." }
          - { label: "Currently line", name: currentlyText, widget: string, required: false, hint: "Short status shown after a fixed 'Currently:' label. Leave blank to hide the whole line." }
          - { label: "Research interests", name: researchInterests, widget: text, required: false, hint: "The paragraph in the Research interests section. Leave blank to use the default text." }

      # -- Homepage Gallery ---------------------------------------------------------
      # File: src/data/homepage-gallery.json
      # Read by src/data/homepage-gallery.ts -> MiscGallery.astro on the homepage
      - name: homepage_gallery
        label: "\U0001F3DE\uFE0F Homepage Gallery"
        file: src/data/homepage-gallery.json
        fields:
          - label: "Travel tile"
            name: travel
            widget: object
            fields:
              - { label: "Label", name: label, widget: string, default: "Travel" }
              - { label: "Caption", name: caption, widget: string, default: "where I've been" }
              - { label: "Image", name: image, widget: image, required: false, hint: "Leave blank to use the default gradient." }
              - label: "Tile Image Framing"
                name: focal
                widget: select
                default: "center"
                options:
                  - { label: "Top Left", value: "top left" }
                  - { label: "Top", value: "top" }
                  - { label: "Top Right", value: "top right" }
                  - { label: "Left", value: "left" }
                  - { label: "Center", value: "center" }
                  - { label: "Right", value: "right" }
                  - { label: "Bottom Left", value: "bottom left" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Bottom Right", value: "bottom right" }
                hint: "Which part of the image stays in frame when it is cropped to fit."
          - label: "Caving tile"
            name: caving
            widget: object
            fields:
              - { label: "Label", name: label, widget: string, default: "Caving" }
              - { label: "Caption", name: caption, widget: string, default: "underground" }
              - { label: "Image", name: image, widget: image, required: false, hint: "Leave blank to use the default gradient." }
              - label: "Tile Image Framing"
                name: focal
                widget: select
                default: "center"
                options:
                  - { label: "Top Left", value: "top left" }
                  - { label: "Top", value: "top" }
                  - { label: "Top Right", value: "top right" }
                  - { label: "Left", value: "left" }
                  - { label: "Center", value: "center" }
                  - { label: "Right", value: "right" }
                  - { label: "Bottom Left", value: "bottom left" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Bottom Right", value: "bottom right" }
                hint: "Which part of the image stays in frame when it is cropped to fit."
          - label: "Languages tile"
            name: languages
            widget: object
            fields:
              - { label: "Label", name: label, widget: string, default: "Languages" }
              - { label: "Caption", name: caption, widget: string, default: "studying Mandarin" }
              - { label: "Image", name: image, widget: image, required: false, hint: "Leave blank to use the default gradient." }
              - label: "Tile Image Framing"
                name: focal
                widget: select
                default: "center"
                options:
                  - { label: "Top Left", value: "top left" }
                  - { label: "Top", value: "top" }
                  - { label: "Top Right", value: "top right" }
                  - { label: "Left", value: "left" }
                  - { label: "Center", value: "center" }
                  - { label: "Right", value: "right" }
                  - { label: "Bottom Left", value: "bottom left" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Bottom Right", value: "bottom right" }
                hint: "Which part of the image stays in frame when it is cropped to fit."
          - label: "Reading tile"
            name: reading
            widget: object
            fields:
              - { label: "Label", name: label, widget: string, default: "Reading" }
              - { label: "Caption", name: caption, widget: string, default: "topology & geometry" }
              - { label: "Image", name: image, widget: image, required: false, hint: "Leave blank to use the default gradient." }
              - label: "Tile Image Framing"
                name: focal
                widget: select
                default: "center"
                options:
                  - { label: "Top Left", value: "top left" }
                  - { label: "Top", value: "top" }
                  - { label: "Top Right", value: "top right" }
                  - { label: "Left", value: "left" }
                  - { label: "Center", value: "center" }
                  - { label: "Right", value: "right" }
                  - { label: "Bottom Left", value: "bottom left" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Bottom Right", value: "bottom right" }
                hint: "Which part of the image stays in frame when it is cropped to fit."

      # -- About --------------------------------------------------------------------
      # File: src/data/about.json
      # Read by src/data/about.ts -> src/pages/about.astro
      - name: about
        label: "\U0001F9D1 About"
        file: src/data/about.json
        fields:
          - label: Meta description
            name: metaDescription
            widget: text
            hint: "The page description search engines show. Aim for under 160 characters."

          - label: Tagline
            name: tagline
            widget: string
            hint: "The large italic line at the top of the page."

          - label: Bio
            name: bio
            widget: markdown
            hint: "One paragraph. Links like [text](https://example.com) open in a new tab."

          - label: Trajectory
            name: timeline
            widget: list
            summary: "{{fields.period}} \u2014 {{fields.role}}"
            fields:
              - { label: Period, name: period, widget: string, hint: "e.g. 2025 \u2014 present" }
              - { label: Role, name: role, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Current, name: current, widget: boolean, default: false, hint: "Shows a small Current badge next to the role." }
              - { label: "Future / target", name: future, widget: boolean, default: false, hint: "Renders the entry with a dashed border (a planned step, not history)." }

      # -- Now ----------------------------------------------------------------------
      # File: src/data/now.json
      # Read by src/data/now.ts -> src/pages/now.astro
      - name: now
        label: "\U0001F570\uFE0F Now"
        file: src/data/now.json
        fields:
          - label: Subtitle
            name: subtitle
            widget: string
            hint: "Shown under the page title."

          - label: Last updated
            name: updated
            widget: string
            required: false
            hint: "Shown as 'Last updated: ...'. Leave blank to hide the line."

          - label: Sections
            name: sections
            widget: list
            summary: "{{fields.heading}}"
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Body, name: body, widget: markdown, hint: "Links like [text](https://example.com) open in a new tab." }

      # -- Uses ---------------------------------------------------------------------
      # File: src/data/uses.json
      # Read by src/data/uses.ts -> src/pages/uses.astro
      - name: uses
        label: "\U0001F9F0 Uses"
        file: src/data/uses.json
        fields:
          - label: Subtitle
            name: subtitle
            widget: string
            hint: "Shown under the page title."

          - label: Last updated
            name: updated
            widget: string
            required: false
            hint: "Appended to the footer as 'Last updated ...'. Leave blank to hide."

          - label: Sections
            name: sections
            widget: list
            summary: "{{fields.heading}}"
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Body, name: body, widget: markdown, hint: "Bold tool names like **MATLAB**; links like [text](https://example.com)." }

      # -- Bookshelf ------------------------------------------------------------------
      # File: src/data/bookshelf.json
      # Read by src/data/bookshelf.ts -> src/pages/bookshelf.astro
      - name: bookshelf
        label: "\U0001F4D6 Bookshelf"
        file: src/data/bookshelf.json
        fields:
          - label: Subtitle
            name: subtitle
            widget: string
            hint: "Shown under the page title."

          - label: Footer note
            name: footerNote
            widget: string
            required: false
            hint: "Small note at the bottom of the page. Leave blank to hide."

          - label: Shelves
            name: sections
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Shelf label, name: label, widget: string }
              - label: Books
                name: books
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Author, name: author, widget: string, required: false }
                  - { label: Note, name: note, widget: text, required: false }

      # -- Colophon -------------------------------------------------------------------
      # File: src/data/colophon.json
      # Read by src/data/colophon.ts -> src/pages/colophon.astro
      - name: colophon
        label: "\U0001F58B\uFE0F Colophon"
        file: src/data/colophon.json
        fields:
          - label: Subtitle
            name: subtitle
            widget: string
            hint: "Shown under the page title."

          - label: Body
            name: body
            widget: markdown
            hint: "The whole page body. Blank paragraphs separate sections; links like [text](https://example.com) open in a new tab."

      # -- Contact ------------------------------------------------------------------
      # File: src/data/contact.json
      # Read by src/data/contact.ts -> src/pages/contact.astro
      # Email address and profile links come from Identity & Contact, not here.
      - name: contact
        label: "\u2709\uFE0F Contact"
        file: src/data/contact.json
        fields:
          - label: Meta description
            name: metaDescription
            widget: text
            hint: "The page description search engines show. Aim for under 160 characters."

          - label: Intro
            name: intro
            widget: string
            hint: "The line under the Contact heading."

          - label: Role line
            name: roleLine
            widget: string
            required: false
            hint: "The small line under the email, e.g. role and affiliation. Leave blank to hide."

          - label: Availability note
            name: availability
            widget: string
            required: false
            hint: "The italic line at the bottom. Leave blank to hide."

      # -- Subscribe ----------------------------------------------------------------
      # File: src/data/subscribe.json
      # Read by src/data/subscribe.ts -> src/pages/subscribe.astro
      - name: subscribe
        label: "\U0001F4EC Subscribe"
        file: src/data/subscribe.json
        fields:
          - label: Meta description
            name: metaDescription
            widget: text
            hint: "The page description search engines show. Aim for under 160 characters."

          - label: Subtitle
            name: subtitle
            widget: text
            hint: "The line under the Subscribe heading."

          - label: Substack publication
            name: publication
            widget: string
            hint: "Just the domain, e.g. yourname.substack.com. Drives the embedded form and the fallback link."

          - label: What to expect
            name: whatToExpect
            widget: text
            hint: "The paragraph under the What to expect heading."

      # -- 404 ----------------------------------------------------------------------
      # File: src/data/not-found.json
      # Read by src/data/not-found.ts -> src/pages/404.astro
      - name: notfound
        label: "\U0001F6A7 404 Page"
        file: src/data/not-found.json
        fields:
          - label: Message
            name: message
            widget: text
            hint: "The line under the big 404."

  - divider: true

  # ============================================================================
  # CONTENT
  # ============================================================================


  # -- Blog Posts -------------------------------------------------------------
  # Schema: src/content.config.ts -> posts collection
  # Files: src/content/posts/*.md
  - name: posts
    label: "\u270D\uFE0F Writing"
    label_singular: "Post"
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title, category]
    summary: "{{title}} \u2014 {{category}} \u2014 {{date}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Post title. Used in page <title>, Open Graph, and listings."

      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: Updated Date
        name: updatedDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false

      - label: Category
        name: category
        widget: select
        options:
          - { label: "Technical Note", value: "technical" }
          - { label: "Thesis", value: "thesis" }
          - { label: "Essay", value: "essay" }
          - { label: "Dispatch", value: "dispatch" }
          - { label: "Build Log", value: "build-log" }
        default: "technical"
        hint: "Technical = rigorous deep dives. Thesis = field-level positions. Essay = considered writing. Dispatch = short observations. Build Log = project documentation."

      - label: Description
        name: description
        widget: text
        hint: "Short summary for SEO meta description and listings (\u2264160 chars)."

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Published
        name: published
        widget: boolean
        default: false
        hint: "Toggle ON to make this post visible on the site."

      - label: Featured
        name: featured
        widget: boolean
        default: false
        hint: "Featured posts appear prominently on the homepage."

      - label: Open Graph Image
        name: ogImage
        widget: image
        required: false
        hint: "Custom social media preview image. Falls back to site default."

      - label: Body
        name: body
        widget: markdown


  # -- Research Projects ------------------------------------------------------
  # Schema: src/content.config.ts -> projects collection
  # Files: src/content/projects/*.md
  - name: projects
    label: "\U0001F52C Projects"
    label_singular: "Project"
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title, number]
    summary: "[{{number}}] {{title}} \u2014 {{institution}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Project Number
        name: number
        widget: string
        default: "99"
        hint: "Display order number (e.g., 01, 02, 03)."

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Highlight Tag
        name: highlightTag
        widget: string
        required: false
        hint: "One tag to visually highlight in the project card."

      - label: Institution
        name: institution
        widget: string
        hint: "Where this work was done (e.g., MIT, Stanford)."

      - label: Content Mode
        name: contentMode
        widget: select
        options:
          - { label: "Structured (Problem / Outcomes / Impact)", value: "structured" }
          - { label: "Freeform (rich content editor)", value: "freeform" }
        default: "structured"
        hint: "Structured = three fixed sections. Freeform = single rich editor."

      # -- Structured content fields (used when contentMode = structured) --
      - label: "The Problem"
        name: problem
        widget: markdown
        required: false

      - label: "Outcomes"
        name: outcomes
        widget: list
        required: false
        default: []
        field: { label: "Outcome", name: outcome, widget: string }

      - label: "Why It Matters"
        name: impact
        widget: markdown
        required: false

      # -- Media --
      - label: Hero Image
        name: heroImage
        widget: image
        required: false

      - label: Hero Image Caption
        name: heroCaption
        widget: string
        required: false

      - label: Video URL
        name: videoUrl
        widget: string
        required: false
        default: ""
        hint: "YouTube or Vimeo URL."

      - label: Interactive URL
        name: interactiveUrl
        widget: string
        required: false
        hint: "Path to an interactive demo (e.g., /interactives/demo.html)."

      - label: Interactive Height (px)
        name: interactiveHeight
        widget: number
        required: false
        default: 500

      - label: Gallery Images
        name: gallery
        widget: list
        required: false
        default: []
        fields:
          - { label: "Image", name: image, widget: image }
          - { label: "Caption", name: caption, widget: string, required: false, default: "" }

      # -- Links & Tech --
      - label: Tech Stack
        name: techStack
        widget: list
        required: false
        default: []
        field: { label: "Technology", name: tech, widget: string }

      - label: Link URL
        name: linkUrl
        widget: string
        required: false
        default: ""

      - label: Link Text
        name: linkText
        widget: string
        required: false
        default: "View presentation \u2192"

      - label: GitHub URL
        name: githubUrl
        widget: string
        required: false
        default: ""

      - label: Related Publications
        name: relatedPublications
        widget: list
        required: false
        default: []
        hint: "BibTeX citation keys from bibliography.bib (e.g., doe2026ssoct)."
        field: { label: "Citation Key", name: key, widget: string }

      - label: Published
        name: published
        widget: boolean
        default: true

      - label: Body
        name: body
        widget: markdown
        required: false

  - name: publications
    label: "\U0001F4DA Publications"
    files:
      # -- Publications (BibTeX) ----------------------------------------------------
      # File: src/data/bibliography.bib
      # Parsed at build time; one entry per publication
      - name: bibliography
        label: "\U0001F4DA Publications (BibTeX)"
        file: src/data/bibliography.bib
        extension: bib
        format: raw
        fields:
          - label: BibTeX Entries
            name: body
            widget: code
            default_language: bibtex
            output_code_only: true
            hint: "Edit BibTeX entries directly. Each @article{...}, @inproceedings{...}, etc. generates a publication page with Highwire Press meta tags."


  # -- Digital Garden Notes ---------------------------------------------------
  # Schema: src/content.config.ts -> notes collection
  # Files: src/content/notes/*.md
  - name: notes
    label: "\U0001F331 Notes"
    label_singular: "Note"
    folder: src/content/notes
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title, maturity]
    summary: "{{title}} \u2014 {{maturity}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: Updated Date
        name: updatedDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false

      - label: Maturity
        name: maturity
        widget: select
        options:
          - { label: "\U0001F331 Seedling", value: "seedling" }
          - { label: "\U0001F33F Budding", value: "budding" }
          - { label: "\U0001F333 Evergreen", value: "evergreen" }
        default: "seedling"
        hint: "Seedling = early idea. Budding = developing. Evergreen = mature and maintained."

      - label: Description
        name: description
        widget: text
        required: false
        default: ""

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Backlinks
        name: backlinks
        widget: list
        required: false
        default: []
        hint: "Slugs of other notes that link to this one (typically auto-computed at build time)."
        field: { label: "Slug", name: slug, widget: string }

      - label: Published
        name: published
        widget: boolean
        default: true

      - label: Body
        name: body
        widget: markdown
        hint: "Use [[double brackets]] to create wiki-links to other notes."


  # -- Teaching ---------------------------------------------------------------
  # Schema: src/content.config.ts -> teaching collection
  # Files: src/content/teaching/*.md
  - name: teaching
    label: "\U0001F393 Teaching"
    label_singular: "Course"
    folder: src/content/teaching
    create: true
    slug: "{{slug}}"
    sortable_fields: [year, title]
    summary: "{{title}} \u2014 {{semester}} {{year}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Course title (e.g., Introduction to Optics)."

      - label: Course Code
        name: courseCode
        widget: string
        required: false
        hint: "e.g., PHYS 320, CS 101."

      - label: Role
        name: role
        widget: select
        options:
          - { label: "Instructor", value: "instructor" }
          - { label: "Teaching Assistant", value: "ta" }
          - { label: "Guest Lecturer", value: "guest-lecturer" }
        default: "ta"

      - label: Institution
        name: institution
        widget: string

      - label: Semester
        name: semester
        widget: string
        hint: "e.g., Fall 2025, Spring 2026."

      - label: Year
        name: year
        widget: number
        value_type: int

      - label: Description
        name: description
        widget: text
        required: false
        default: ""

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Syllabus URL
        name: syllabusUrl
        widget: string
        required: false
        hint: "Link to the course syllabus."

      - label: Published
        name: published
        widget: boolean
        default: true

      - label: Body
        name: body
        widget: markdown
        required: false


  # Misc (Outside the lab) -- schema: src/content.config.ts -> misc collection
  - name: misc
    label: "\U0001F3D4\uFE0F Misc"
    label_singular: "Entry"
    folder: src/content/misc
    create: true
    slug: "{{slug}}"
    sortable_fields: [order, date, title]
    summary: "{{title}} -- {{section}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Section
        name: section
        widget: select
        options:
          - { label: "Travel", value: "travel" }
          - { label: "Caving", value: "caving" }
          - { label: "Languages", value: "languages" }
          - { label: "Reading", value: "reading" }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Summary, name: summary, widget: string, required: false, default: "" }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - label: "Hero Image Framing"
        name: heroFocal
        widget: select
        default: "center"
        options:
          - { label: "Top Left", value: "top left" }
          - { label: "Top", value: "top" }
          - { label: "Top Right", value: "top right" }
          - { label: "Left", value: "left" }
          - { label: "Center", value: "center" }
          - { label: "Right", value: "right" }
          - { label: "Bottom Left", value: "bottom left" }
          - { label: "Bottom", value: "bottom" }
          - { label: "Bottom Right", value: "bottom right" }
        hint: "Which part of the image stays in frame when it is cropped to fit."
      - { label: Hero Image Caption, name: heroCaption, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false, default: [] }
      - { label: Order, name: order, widget: number, required: false, default: 0 }
      - { label: Published, name: published, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  # -- Ventures ---------------------------------------------------------------
  # Schema: src/content.config.ts -> ventures collection
  # Files: src/content/ventures/*.md  (rendered at /ventures/)
  # Section is hidden until settings.json -> sections.ventures is true.

