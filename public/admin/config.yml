      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Problem
        name: problem
        widget: text
