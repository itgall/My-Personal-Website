        hint: "What problem does this venture solve?"

      - label: Research Foundation
        name: researchFoundation
        widget: text
        required: false
        hint: "The research or technical insight the venture is built on."

      - label: Tech Stack
        name: techStack
        widget: list
        required: false
        default: []

      - label: Website URL
        name: websiteUrl
        widget: string
        required: false

      - label: Hero Image
        name: heroImage
        widget: image
        required: false

      - label: Published
        name: published
        widget: boolean
        default: true

      - label: Related Publications
        name: relatedPublications
        widget: list
        required: false
        default: []
        hint: "Citation keys from the bibliography."

      - label: Related Projects
        name: relatedProjects
        widget: list
        required: false
        default: []
        hint: "Slugs of related projects."

      - label: Related Posts
        name: relatedPosts
        widget: list
        required: false
        default: []
        hint: "Slugs of related writing."

      - label: Related Episodes
        name: relatedEpisodes
        widget: list
        required: false
        default: []
        hint: "Slugs of related podcast episodes."

      - label: Body
        name: body
        widget: markdown

  # -- Speaking ---------------------------------------------------------------
  # Schema: src/content.config.ts -> speaking collection
  # Files: src/content/speaking/*.md  (listed at /speaking/)
  # Section is hidden until settings.json -> sections.speaking is true.

  - name: speaking
    label: "\U0001F3A4 Speaking"
    label_singular: "Talk"
    folder: src/content/speaking
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title, event]
    summary: "{{title}} \u2014 {{event}} \u2014 {{date}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Talk title."

      - label: Event
        name: event
        widget: string
        hint: "Event or venue name."

      - label: Location
        name: location
        widget: string
        required: false
        hint: "City, country, or 'Remote'."

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"

      - label: Type
        name: type
        widget: select
        options:
          - { label: "Talk", value: "talk" }
          - { label: "Panel", value: "panel" }
          - { label: "Keynote", value: "keynote" }
          - { label: "Guest Lecture", value: "guest-lecture" }
          - { label: "Podcast", value: "podcast" }
          - { label: "Media", value: "media" }
        default: "talk"

      - label: Description
        name: description
        widget: text
        required: false
        default: ""

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Video URL
        name: videoUrl
        widget: string
        required: false

      - label: Slides URL
        name: slidesUrl
        widget: string
        required: false

      - label: Event URL
        name: eventUrl
        widget: string
        required: false

      - label: Featured
        name: featured
        widget: boolean
        default: false

      - label: Published
        name: published
        widget: boolean
        default: true

      - label: Related Projects
        name: relatedProjects
        widget: list
        required: false
        default: []
        hint: "Slugs of related projects."

      - label: Related Episodes
        name: relatedEpisodes
        widget: list
        required: false
        default: []
        hint: "Slugs of related podcast episodes."

      - label: Body
        name: body
        widget: markdown
        required: false
        hint: "Optional notes. Not shown on the site yet."

  # -- Podcast ----------------------------------------------------------------
  # Schema: src/content.config.ts -> podcast collection
  # Files: src/content/podcast/*.md  (rendered at /podcast/)
  # Section is hidden until settings.json -> sections.podcast is true.
  # Note: episodes default to unpublished so drafts never go live by accident.

  - name: podcast
    label: "\U0001F399\uFE0F Podcast"
    label_singular: "Episode"
    folder: src/content/podcast
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, episodeNumber, title]
    summary: "{{title}} \u2014 {{date}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Episode title."

      - label: Episode Number
        name: episodeNumber
        widget: number
        value_type: int
        required: false

      - label: Season
        name: season
        widget: number
        value_type: int
        required: false

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"

      - label: Description
        name: description
        widget: text
        hint: "Required. Used for SEO and episode cards."

      - label: Episode Type
        name: episodeType
        widget: select
        options:
          - { label: "Solo", value: "solo" }
          - { label: "Interview", value: "interview" }
          - { label: "Panel", value: "panel" }
          - { label: "Journal Club", value: "journal-club" }
          - { label: "AMA", value: "ama" }
          - { label: "Case Study", value: "case-study" }
        default: "interview"

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []

      - label: Guests
        name: guests
        widget: list
        required: false
        default: []
        summary: "{{fields.name}}"
        fields:
          - { label: "Name", name: name, widget: string }
          - { label: "Title", name: title, widget: string, required: false }
          - { label: "URL", name: url, widget: string, required: false }

      - label: Chapters
        name: chapters
        widget: list
        required: false
        default: []
        summary: "{{fields.time}} {{fields.title}}"
        fields:
          - { label: "Time", name: time, widget: string, hint: "e.g., 12:34" }
          - { label: "Title", name: title, widget: string }

      - label: YouTube URL
        name: youtubeUrl
        widget: string
        required: false

      - label: Spotify URL
        name: spotifyUrl
        widget: string
        required: false

      - label: Apple Podcasts URL
        name: appleUrl
        widget: string
        required: false

      - label: Duration
        name: duration
        widget: string
        required: false
        hint: "e.g., 47:32"

      - label: Has Transcript
        name: hasTranscript
        widget: boolean
        default: false
        hint: "Turn on once a matching transcript entry exists."

      - label: Featured
        name: featured
        widget: boolean
        default: false

      - label: Published
        name: published
        widget: boolean
        default: false
        hint: "Off by default. Turn on to publish the episode."

      - label: Related Projects
        name: relatedProjects
        widget: list
        required: false
        default: []
        hint: "Slugs of related projects."

      - label: Related Publications
        name: relatedPublications
        widget: list
        required: false
        default: []
        hint: "Citation keys from the bibliography."

      - label: Related Posts
        name: relatedPosts
        widget: list
        required: false
        default: []
        hint: "Slugs of related writing."

      - label: Show Notes
        name: body
        widget: markdown

  # -- Transcripts ------------------------------------------------------------
  # Schema: src/content.config.ts -> transcripts collection
  # Files: src/content/transcripts/*.md  (rendered at /podcast/transcripts/)
  # Each transcript pairs with one episode via episodeSlug.

  - name: transcripts
    label: "\U0001F4DD Transcripts"
    label_singular: "Transcript"
    folder: src/content/transcripts
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title]
    summary: "{{title}} \u2014 {{episodeSlug}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "e.g., Episode 12 \u2014 Full Transcript."

      - label: Episode Slug
        name: episodeSlug
        widget: string
        hint: "Filename of the matching episode, without .md."

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"

      - label: Published
        name: published
        widget: boolean
        default: false

      - label: Transcript
        name: body
        widget: markdown

  - divider: true

  # ============================================================================
  # SITE
  # ============================================================================

  - name: site
    label: "\u2699\uFE0F Site"
    files:
      # -- Identity & Contact -------------------------------------------------------
      # File: src/data/identity.json
      # Read by src/data/meta.ts -> hero, meta tags, structured data, contact page
      - name: identity
        label: "\U0001F464 Identity & Contact"
        file: src/data/identity.json
        fields:
          - { label: "Name", name: name, widget: string, hint: "Your full name. Appears in the homepage hero, the browser title, and structured data across the site." }
          - { label: "Role", name: role, widget: string, hint: "Your primary role, e.g. Research Engineer. Shown in the hero role line and used as your job title in structured data." }
          - { label: "Affiliation", name: affiliation, widget: string, hint: "Institution as you want it displayed, e.g. Harvard Medical School. Shown after your role in the hero." }
          - { label: "Email", name: email, widget: string, hint: "Contact email. Drives every mailto link and the contact page." }
          - { label: "LinkedIn URL", name: linkedin, widget: string, hint: "Full URL, e.g. https://linkedin.com/in/yourhandle" }
          - { label: "GitHub URL", name: github, widget: string, hint: "Full URL, e.g. https://github.com/yourhandle" }
          - { label: "Google Scholar URL", name: googleScholar, widget: string, hint: "Full URL to your Google Scholar profile." }
          - { label: "ORCID iD", name: orcid, widget: string, hint: "Just the iD, e.g. 0009-0007-9290-6289 (not the full URL)." }
          - { label: "CV file path", name: cvPath, widget: string, hint: "Path to your CV PDF under public/, e.g. /documents/gallegos-cv.pdf" }

      # -- Navigation ---------------------------------------------------------------
      # File: src/data/navigation.json
      # Read by src/data/navigation.ts -> header nav
      - name: navigation
        label: "\U0001F9ED Navigation"
        file: src/data/navigation.json
        fields:
          - label: "Primary Navigation"
            name: primaryNav
            widget: list
            hint: "Items shown in the top navigation bar. Drag to reorder. Recommended: 3\u20135 items."
            fields:
              - { label: "Label", name: label, widget: string, hint: "Display text shown in the nav bar." }
              - { label: "URL", name: href, widget: string, hint: "Path like /projects/ or /publications/. Must start with /." }
              - { label: "Active Match Pattern", name: activeMatch, widget: string, required: false, hint: "Regex pattern to highlight this item. E.g. '/projects|/publications' highlights for both paths." }
          - label: "More Navigation"
            name: moreNav
            widget: list
            hint: "Overflow items accessible via the 'More' dropdown on desktop and the mobile menu."
            fields:
              - { label: "Label", name: label, widget: string, hint: "Display text shown in the menu." }
              - { label: "URL", name: href, widget: string, hint: "Path like /podcast/ or /notes/. Must start with /." }
              - { label: "Active Match Pattern", name: activeMatch, widget: string, required: false, hint: "Regex pattern to highlight this item when active." }

      # -- CV / Resume --------------------------------------------------------------
      # File: src/data/cv.yaml
      # Read by src/pages/cv.astro
      - name: cv
        label: "\U0001F4C4 CV / Resume"
        file: src/data/cv.yaml
        fields:
          - label: Full Name
            name: name
            widget: string

          - label: Professional Title
            name: title
            widget: string

          - label: Affiliation
            name: affiliation
            widget: string
            hint: "Primary institutional affiliation."

          - label: Email
            name: email
            widget: string

          - label: Website
            name: website
            widget: string

          - label: ORCID
            name: orcid
            widget: string
            hint: "e.g., 0000-0002-1234-5678"

          - label: Research Interests
            name: research_interests
            widget: list
            field: { label: "Interest", name: interest, widget: string }

          - label: Education
            name: education
            widget: list
            fields:
              - { label: "Degree", name: degree, widget: string }
              - { label: "Institution", name: institution, widget: string }
              - { label: "Location", name: location, widget: string }
              - { label: "Dates", name: dates, widget: string }
              - { label: "GPA", name: gpa, widget: string, required: false }
              - label: "Honors"
                name: honors
                widget: list
                required: false
                default: []
                field: { label: "Honor", name: honor, widget: string }

          - label: Experience
            name: experience
            widget: list
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Organization", name: organization, widget: string }
              - { label: "Parent Organization", name: parent, widget: string, required: false }
              - { label: "Location", name: location, widget: string }
              - { label: "Dates", name: dates, widget: string }
              - { label: "Current Position", name: current, widget: boolean, default: false }
              - label: "Highlights"
                name: highlights
                widget: list
                required: false
                default: []
                field: { label: "Highlight", name: highlight, widget: string }

          - label: Skills
            name: skills
            widget: list
            fields:
              - { label: "Category", name: category, widget: string }
              - label: "Items"
                name: items
                widget: list
                field: { label: "Skill", name: skill, widget: string }

          - label: Research Experience
            name: research
            widget: list
            required: false
            default: []
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Institution", name: institution, widget: string }
              - { label: "Dates", name: dates, widget: string }
              - { label: "Description", name: description, widget: text }

          - label: Teaching
            name: teaching
            widget: list
            required: false
            default: []
            fields:
              - { label: "Role", name: role, widget: string }
              - { label: "Course", name: course, widget: string }
              - { label: "Institution", name: institution, widget: string }
              - { label: "Dates", name: dates, widget: string }

          - label: Awards & Fellowships
            name: awards
            widget: list
            required: false
            default: []
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Institution", name: institution, widget: string, required: false }
              - { label: "Dates", name: dates, widget: string, required: false }

          - label: Professional Service
            name: service
            widget: list
            required: false
            default: []
            fields:
              - { label: "Role", name: role, widget: string }
              - { label: "Organization", name: organization, widget: string }
              - { label: "Dates", name: dates, widget: string, required: false }

          - label: Selected Talks
            name: talks
            widget: list
            required: false
            default: []
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Venue", name: venue, widget: string, required: false }
              - { label: "Dates", name: dates, widget: string, required: false }

      # -- Site Settings ------------------------------------------------------------
      # File: src/data/settings.json
      # Read by src/data/settings.ts -> feature toggles, sections, appearance
      - name: settings
        label: "\U0001F39B\uFE0F Features & Appearance"
        file: src/data/settings.json
        fields:
          - label: Features
            name: features
            widget: object
            fields:
              - { label: "\u26A0\uFE0F Maintenance Mode", name: maintenanceMode, widget: boolean, default: false, hint: "Block all site content with an 'under construction' overlay. Bypass with ?preview=true in the URL." }
              - { label: "Sidenotes", name: sidenotes, widget: boolean, default: true, hint: "Transform footnotes into Tufte-style margin notes." }
              - label: "Default Accent Color"
                name: defaultAccent
                widget: select
                options:
                  - { label: "405nm Violet", value: "violet" }
                  - { label: "Ink Teal", value: "ink-teal" }
                  - { label: "Web Blue", value: "web-blue" }
                  - { label: "Harvard Crimson", value: "harvard" }
                  - { label: "MIT Red", value: "mit" }
                  - { label: "Stanford Cardinal", value: "stanford" }
                  - { label: "Yale Blue", value: "yale" }
                  - { label: "Princeton Orange", value: "princeton" }
                  - { label: "Caltech Orange", value: "caltech" }
                  - { label: "Dartmouth Green", value: "dartmouth" }
                  - { label: "Terracotta", value: "terracotta" }
                  - { label: "Interferometer (steel blue)", value: "interferometer" }
                  - { label: "Coherence (deep navy)", value: "coherence" }
                  - { label: "Sodium Arc (amber)", value: "sodium-arc" }
                  - { label: "Cherenkov (luminous blue)", value: "cherenkov" }
                  - { label: "Blackbody (copper)", value: "blackbody" }
                  - { label: "Second Harmonic (532nm green)", value: "second-harmonic" }
                default: "violet"
                hint: "Accent color preset. Custom accents, university brands, and physics-grounded themes."
              - { label: "Backlinks", name: backlinks, widget: boolean, default: true, hint: "Show bidirectional backlink panels on content pages." }
              - { label: "Table of Contents", name: tableOfContents, widget: boolean, default: true, hint: "Show table of contents on blog posts." }
              - { label: "Link Previews", name: linkPreviews, widget: boolean, default: true, hint: "Show hover/focus link preview popovers." }
              - { label: "Search Page", name: searchPage, widget: boolean, default: true, hint: "Enable the /search/ page with Pagefind full-text search." }
              - { label: "Research Graph", name: researchGraph, widget: boolean, default: true, hint: "Enable the /graph/ page with D3 force-directed visualization." }
              - { label: "Content Maturity Badges", name: contentMaturityBadges, widget: boolean, default: true, hint: "Show seedling/budding/evergreen badges on notes." }
              - { label: "Copy Code Button", name: copyCodeButton, widget: boolean, default: true, hint: "Show copy button on code blocks." }
              - { label: "Image Zoom", name: imageZoom, widget: boolean, default: true, hint: "Click-to-zoom on images inside article content." }
              - { label: "Document Viewer", name: documentViewer, widget: boolean, default: true, hint: "Inline PDF/document preview overlay. Links with data-doc-viewer open in an overlay instead of navigating away." }
              - { label: "Reading Progress Bar", name: readingProgressBar, widget: boolean, default: false, hint: "Show reading progress bar on article pages." }
              - { label: "Command Palette (\u2318K)", name: commandPalette, widget: boolean, default: false, hint: "Enable \u2318K / Ctrl+K keyboard shortcut for quick navigation." }
              - { label: "Visual Effects", name: visualEffects, widget: boolean, default: false, hint: "Enable ambient canvas visual effects (particles, dust)." }
              - { label: "AI Chat Widget", name: chatWidget, widget: boolean, default: false, hint: "Enable AI-powered chat widget for visitor questions." }
              - { label: "Document Request Modal", name: documentRequestModal, widget: boolean, default: true, hint: "Enable gated CV/resume access \u2014 visitors submit a form to request documents." }

          - label: Sections
            name: sections
            widget: object
            hint: "Toggle site sections on or off. Disabled sections are hidden from navigation."
            fields:
              - { label: "Publications", name: publications, widget: boolean, default: true }
              - { label: "Projects", name: projects, widget: boolean, default: true }
              - { label: "Essays", name: blog, widget: boolean, default: true }
              - { label: "Notes", name: notes, widget: boolean, default: true }
              - { label: "Teaching", name: teaching, widget: boolean, default: true }
              - { label: "CV", name: cv, widget: boolean, default: true }
              - { label: "About", name: about, widget: boolean, default: true }
              - { label: "Contact", name: contact, widget: boolean, default: true }
              - { label: "Ventures", name: ventures, widget: boolean, default: true }
              - { label: "Speaking", name: speaking, widget: boolean, default: true }
              - { label: "Podcast", name: podcast, widget: boolean, default: true }

          - label: Appearance
            name: appearance
            widget: object
            fields:
              - label: "Default Theme"
                name: defaultTheme
                widget: select
                options:
                  - { label: "Dark", value: "dark" }
                  - { label: "Light", value: "light" }
                  - { label: "System (follows visitor's OS)", value: "system" }
                default: "dark"
                hint: "Site-wide color theme. 'System' respects the visitor's OS light/dark preference."
              - label: "Loading Animation"
                name: loadingAnimation
                widget: select
                options:
                  - { label: "None", value: "none" }
                  - { label: "Monogram", value: "monogram" }
                  - { label: "Terminal", value: "terminal" }
                  - { label: "Pulse", value: "pulse" }
                  - { label: "Name Reveal", value: "name" }
                default: "none"
                hint: "Loading animation shown before the page renders."
              - { label: "View Transitions", name: viewTransitions, widget: boolean, default: true, hint: "Smooth page transitions powered by the Astro View Transitions API." }
              - { label: "Scroll Reveal", name: scrollReveal, widget: boolean, default: false, hint: "Fade/slide elements in as they enter the viewport." }
              - { label: "Custom Cursor", name: customCursor, widget: boolean, default: false, hint: "Use custom SVG cursor themed to the accent color." }
              - label: "Site Style"
                name: siteStyle
                widget: select
                options:
                  - { label: "Default", value: "default" }
                  - { label: "Minimal", value: "minimal" }
                default: "default"
                hint: "Default uses the full accent color system. Minimal uses monochrome typography-first design."
